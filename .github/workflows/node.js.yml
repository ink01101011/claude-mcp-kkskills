# CI: type-check, lint, format, build, validate skills
name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Fast checks on a single Node version
  checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'
          cache-dependency-path: mcp-server/package-lock.json

      - run: npm ci

      - name: TypeScript type-check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

      - name: Validate SKILL.md frontmatter
        working-directory: ${{ github.workspace }}
        run: |
          errors=0
          for f in skills/*/SKILL.md; do
            if ! grep -q "^name:" "$f"; then
              echo "MISSING name: in $f"
              errors=$((errors+1))
            fi
            if ! grep -q "^description:" "$f"; then
              echo "MISSING description: in $f"
              errors=$((errors+1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "Found $errors frontmatter error(s)"
            exit 1
          fi
          echo "All SKILL.md files are valid"

  # Build matrix across supported Node versions
  build:
    runs-on: ubuntu-latest
    needs: checks

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    defaults:
      run:
        working-directory: mcp-server

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: mcp-server/package-lock.json

      - run: npm ci
      - run: npm run build
